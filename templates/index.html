<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☀TENCUACA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="sky-bg">
        <div class="sun"></div>
        
        <div class="wind wind1"></div>
        <div class="wind wind2"></div>
        <div class="wind wind3"></div>
        <div class="wind wind4"></div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
    </div>

    <div class="content-wrapper">
        <h1>☀TENCUACA<br>(Tentukan Cuaca)</h1>
        <h3>Periksa kondisi cuaca dengan klasifikasi cuaca cerdas</h3>
        
        <div class="container">
            <p>Unggah gambar cuaca atau lingkungan untuk diprediksi (Cloudy, Rain, Shine).</p>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p id="upload-text">☁️ Klik untuk memilih gambar dari perangkat Anda ☀️</p>
                <input type="file" id="fileInput" style="display: none;" accept="image/jpeg, image/png, image/jpg" onchange="previewImage(event)">
                <img id="preview" alt="Preview Gambar">
            </div>

            <button id="predictBtn" onclick="processImage()" disabled>Periksa Cuaca</button>

            <div id="result-box"></div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview');
                    const text = document.getElementById('upload-text');
                    
                    img.src = e.target.result;
                    img.style.display = 'block';
                    text.style.display = 'none';
                    
                    document.getElementById('predictBtn').disabled = false;
                    document.getElementById('result-box').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        async function processImage() {
            if (!selectedFile) return;

            const btn = document.getElementById('predictBtn');
            const resultBox = document.getElementById('result-box');
            
            btn.disabled = true;
            btn.innerText = "Menganalisis Cuaca...";
            resultBox.style.display = 'none';
            resultBox.className = '';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                resultBox.style.display = 'block';
                if (data.status === 'success') {
                    resultBox.classList.add('success');
                    resultBox.innerText = "☁️ Hasil: " + data.prediction;
                } else {
                    resultBox.classList.add('error');
                    resultBox.innerText = "❌ Error: " + data.message;
                }
            } catch (error) {
                resultBox.style.display = 'block';
                resultBox.classList.add('error');
                resultBox.innerText = "❌ Gagal terhubung ke server.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Prediksi Cuaca";
            }
        }
    </script>

</body>
</html>
